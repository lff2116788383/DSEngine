suite_id: editor-api-extended
description: API 会话扩展覆盖（Lua 控制台 / Play-Stop 生命周期 / 选择 / 材质 / 复制+批删 / 新建+查找+重父级）

env: tests/automation/envs/local-dse.yaml

cases:
  - tests/automation/cases/api/lua_console_exec.yaml
  - tests/automation/cases/api/play_stop_lifecycle.yaml
  - tests/automation/cases/api/entity_selection.yaml
  - tests/automation/cases/api/material_create_import.yaml
  - tests/automation/cases/api/entity_duplicate_batch_delete.yaml
  - tests/automation/cases/api/scene_new_find_reparent.yaml

case_delay_seconds: 1
case_timeout_seconds: 90
process_cleanup: true

retry:
  max_retries: 2
  retry_delay_seconds: 3
  retry_on_status: ["failed"]
