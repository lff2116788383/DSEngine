case_id: api.script_create
title: 打开工程 → 写入 Lua 脚本文件 → 校验落盘 → 退出

# 覆盖 dsengine_script_create（脚本资源写盘后端）：path + content → 写文件。
# 注：该工具非法路径（含 ".."）走 JSON-RPC error 返回，而框架对任何 error 响应
# 直接判 step failed（dse_auto.py: 若 resp 含 "error" 即 failed），无 expect_error
# 机制，故负路径不在本 api 用例断言范围内（由 L0 gtest 覆盖）。仅测成功路径。
setup:
  - action: create_dir
    path: "${project_dir}/scripts"

command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/script_create_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true

    # 写入一个最小 Lua 脚本：返回 written:true 且回显规范化后的路径
    - method: dsengine_script_create
      params:
        path: "${project_dir}/scripts/auto_spinner.lua"
        content: |
          -- auto-generated by api.script_create
          function on_update(dt)
            return dt
          end
      expect:
        result.written: true

    # 覆写同一路径（trunc 语义）应仍成功，验证可重复写入
    - method: dsengine_script_create
      params:
        path: "${project_dir}/scripts/auto_spinner.lua"
        content: "-- overwritten\n"
      expect:
        result.written: true

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
