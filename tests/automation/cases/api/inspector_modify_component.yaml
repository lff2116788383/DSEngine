case_id: api.inspector_modify_component
title: 打开工程 → 创建实体 → 加组件 → 改属性 → 校验组件列表 → 退出

command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/inspector_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true

    # entt 实体 id 含版本位，registry.clear 后并非 0..n，故不能硬编码；
    # 用 capture 把 entity_create 返回的真实 id 存进变量供后续调用引用。
    - method: dsengine_entity_create
      params:
        name: "Prop"
      capture:
        prop_id: result.entity_id
      expect:
        result.name: "Prop"

    - method: dsengine_entity_add_component
      params:
        entity_id: "${prop_id}"
        type: "PointLight"
      expect:
        result.added: true
        result.component: "PointLight"

    - method: dsengine_entity_get_components
      params:
        entity_id: "${prop_id}"
        detailed: false
      expect:
        result.entity_id: "${prop_id}"
        result.name: "Prop"
        result.components: ["Transform", "PointLight"]

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
