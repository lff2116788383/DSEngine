case_id: api.scene_new_find_reparent
title: 打开工程 → 建父子 → 按名查找 → 重父级 → 新建场景清空 → 校验 → 退出

# 覆盖 Hierarchy 拖拽改父级 + 按名定位 + 「新建场景」：
# dsengine_entity_find_by_name / entity_reparent / scene_new。
command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/new_find_reparent_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true

    - method: dsengine_entity_create
      params:
        name: "ParentNode"
      capture:
        parent_id: result.entity_id
      expect:
        result.name: "ParentNode"

    - method: dsengine_entity_create
      params:
        name: "ChildNode"
      capture:
        child_id: result.entity_id
      expect:
        result.name: "ChildNode"

    # 精确按名查找：唯一命中，首个 entity_id 即 parent
    - method: dsengine_entity_find_by_name
      params:
        name: "ParentNode"
      expect:
        result.count: 1
        result.entity_id: "${parent_id}"

    # 把 Child 挂到 Parent 下；返回回显新 parent_id
    - method: dsengine_entity_reparent
      params:
        entity_id: "${child_id}"
        parent_id: "${parent_id}"
      expect:
        result.entity_id: "${child_id}"
        result.parent_id: "${parent_id}"

    # 新建场景清空 registry
    - method: dsengine_scene_new
      expect:
        result.cleared: true
        result.path: "Untitled"

    # 以「按名查找」校验清空生效（遍历存活实体，可靠）：
    # 父/子节点均应零命中。
    # 注：不以 scene_get_state.entity_count 校验清空——该字段取
    # registry.storage<entity>().size()，含已释放槽位，clear 后不回落。
    - method: dsengine_entity_find_by_name
      params:
        name: "ParentNode"
      expect:
        result.count: 0

    - method: dsengine_entity_find_by_name
      params:
        name: "ChildNode"
      expect:
        result.count: 0

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
