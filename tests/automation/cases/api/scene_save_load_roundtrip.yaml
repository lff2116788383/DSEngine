case_id: api.scene_save_load_roundtrip
title: 打开工程 → 改场景 → 存盘 → 新建清空 → 回载 → 校验持久化状态还原 → 退出

# 覆盖 save/load 闭环（dsengine_scene_save / scene_new / scene_load）：
# 改动场景后存盘，scene_new 清空 registry，再 scene_load 回载，校验改动被持久化
# 并完整还原（实体数 + 改名后的实体可按名命中）。
# 实体数以 scene_get_state.entity_count 校验（遍历 valid() 计数）；scene_load 自带的
# entity_count 字段现亦统一走 CountValidEntities，故一并直接断言其回显正确。
setup:
  - action: create_dir
    path: "${project_dir}"

command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/scene_roundtrip_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true
        result.entity_count: 4

    # 新增一个具名实体并改 transform，作为「改动」标记
    - method: dsengine_entity_create
      params:
        name: "Marker"
      capture:
        mid: result.entity_id
      expect:
        result.name: "Marker"

    - method: dsengine_entity_modify
      params:
        entity_id: "${mid}"
        name: "MarkerSaved"
        position: [9, 8, 7]
      expect:
        result.entity_id: "${mid}"
        result.modified: true

    - method: dsengine_scene_get_state
      expect:
        result.entity_count: 5

    # 存盘到工作区
    - method: dsengine_scene_save
      params:
        path: "${project_dir}/roundtrip_scene.json"
      expect:
        result.saved: true
        result.path: "${project_dir}/roundtrip_scene.json"

    # 新建场景清空 registry
    - method: dsengine_scene_new
      expect:
        result.cleared: true

    - method: dsengine_scene_get_state
      expect:
        result.entity_count: 0

    # 回载存盘文件：scene_load 自带 entity_count 现以 valid() 计数，应精确为 5
    # （此前取 storage.size()，scene_new 清空后的已释放槽位会使其虚高）。
    - method: dsengine_scene_load
      params:
        path: "${project_dir}/roundtrip_scene.json"
      expect:
        result.loaded: true
        result.path: "${project_dir}/roundtrip_scene.json"
        result.entity_count: 5

    # 实体数完整还原为 5（以 valid() 计数的 scene_get_state 为准）
    - method: dsengine_scene_get_state
      expect:
        result.entity_count: 5

    # 改名后的实体应被持久化并可按名命中（count 标量，避开 id 列表严格相等坑）
    - method: dsengine_entity_find_by_name
      params:
        name: "MarkerSaved"
      expect:
        result.count: 1

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
