case_id: api.material_create_import
title: 打开工程 → 创建材质(.dmat) → 资源导入回读 → 校验一致 → 退出

# 覆盖材质面板后端（dsengine_material_create）+ 资源浏览器导入（dsengine_asset_import）：
# 先写一个 PBR 材质到 .dmat 并载入，再用 asset_import 按 .dmat 扩展自动识别为 material 回读，
# 断言往返一致（material_name 与导入回读 name 相同）。
setup:
  - action: create_dir
    path: "${project_dir}/materials"

command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/material_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true

    - method: dsengine_material_create
      params:
        name: "auto_test_mat"
        shader_variant: "MESH_PBR"
        base_color: [0.2, 0.6, 0.9, 1.0]
        metallic: 0.25
        roughness: 0.7
        save_path: "${project_dir}/materials/auto_test_mat.dmat"
      capture:
        mat_name: result.material_name
      expect:
        result.success: true
        result.file_path: "${project_dir}/materials/auto_test_mat.dmat"

    # asset_import 按 .dmat 扩展自动识别为 material，回读应得到同名材质实例
    - method: dsengine_asset_import
      params:
        path: "${project_dir}/materials/auto_test_mat.dmat"
        type: "auto"
      expect:
        result.success: true
        result.type: "material"
        result.name: "${mat_name}"

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
