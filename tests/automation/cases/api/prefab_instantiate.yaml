case_id: api.prefab_instantiate
title: 打开工程 → 创建实体 → 存预制体 → 实例化 → 校验数量 → 退出

setup:
  - action: create_dir
    path: "${project_dir}/prefabs"

command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  failure_screenshot_path: "${report_root}/prefab_failure.png"
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_project_open
      params:
        path: "${testdata_dir}/projects/simple_2d_game/project.dseproj"
      expect:
        result.opened: true
        result.entity_count: 4

    # 用 capture 记录真实 entity_id（含 entt 版本位），避免硬编码 4。
    - method: dsengine_entity_create
      params:
        name: "Turret"
      capture:
        turret_id: result.entity_id
      expect:
        result.name: "Turret"

    - method: dsengine_prefab_save
      params:
        entity_id: "${turret_id}"
        path: "${project_dir}/prefabs/turret.prefab.json"
      expect:
        result.saved: true

    - method: dsengine_prefab_instantiate
      params:
        path: "${project_dir}/prefabs/turret.prefab.json"
      expect:
        result.source_path: "${project_dir}/prefabs/turret.prefab.json"

    - method: dsengine_scene_get_state
      expect:
        result.entity_count: 6

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
