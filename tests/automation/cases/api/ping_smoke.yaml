case_id: api.ping_smoke
title: WebSocket 就绪探活 → 列出工具 → 退出

# 最快的 API 会话冒烟：验证编辑器无头启动后 ControlServer 可连、可应答、能优雅退出。
command:
  type: api_session
  executable: "${editor_exe}"
  api_port: ${api_port}
  startup_args:
    - "--headless"
    - "--automation-api"
    - "--api-port"
    - "${api_port}"
  calls:
    - method: dsengine_ping
      expect:
        result.pong: true

    - method: dsengine_list_tools
      expect:
        result.count: "> 0"

    - method: dsengine_editor_quit
      expect:
        result.ok: true

assert:
  exit_code: 0
