<!DOCTYPE html>
<!--
  DSEngine Web 宿主页面模板（emcc --shell-file）。
  emcc 会把生成的胶水脚本注入到 {{{ SCRIPT }}} 处。
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>DSEngine</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1f2e; color: #cdd6f4;
                 font-family: system-ui, sans-serif; overflow: hidden; }
    #container { position: fixed; inset: 0; display: flex; align-items: center;
                 justify-content: center; }
    canvas.emscripten { display: block; border: 0; background: #000;
                        width: 100vw; height: 100vh; touch-action: none; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; gap: 12px;
               transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #bar { width: 240px; height: 6px; background: #313244; border-radius: 3px; overflow: hidden; }
    #bar > div { height: 100%; width: 0%; background: #89b4fa; transition: width 0.2s; }
    #title { font-size: 18px; letter-spacing: 2px; }
    #status { font-size: 13px; color: #a6adc8; }
  </style>
</head>
<body>
  <div id="container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <div id="loading">
    <div id="title">DSEngine</div>
    <div id="bar"><div></div></div>
    <div id="status">Loading…</div>
  </div>
  <script>
    // ---- A5 运行期路径选择：URL 参数 + WebGL2 能力探测 → main(argc,argv) ----
    // 同一份产物可在运行时按 URL 或浏览器能力自动选 2D / 3D 路径并允许显式覆盖：
    //   ?mode=2d|3d     渲染路径（缺省 3D；WebGL2 不可用自动回退 2D）
    //   ?profile=NAME   显式覆盖渲染剖面（DSE_RENDER_PIPELINE_PROFILE）
    //   ?lua=PATH       显式覆盖启动 Lua 脚本
    // web_main.cpp 解析这些 --key=value 参数并写入进程环境/启动配置。
    var DSE_DEFAULT_MODE = '3d';
    function dseHasWebGL2() {
      try { return !!document.createElement('canvas').getContext('webgl2'); }
      catch (e) { return false; }
    }
    function dseHasWebGPU() {
      return (typeof navigator !== 'undefined') && !!navigator.gpu;
    }
    function dseBuildArgs() {
      var p = new URLSearchParams(location.search);
      var hasWebGL2 = dseHasWebGL2();
      window.__dseWebGL2 = hasWebGL2;
      var mode = p.get('mode') || DSE_DEFAULT_MODE;
      // 能力探测：3D 路径需要 WebGL2。请求/缺省为 3D 但不可用 → 自动回退 2D。
      if (mode === '3d' && !hasWebGL2) {
        console.warn('[dse] WebGL2 unavailable; falling back to 2D render path');
        mode = '2d';
      }
      var args = ['--mode=' + mode];
      if (p.get('profile')) args.push('--profile=' + p.get('profile'));
      if (p.get('lua')) args.push('--lua=' + p.get('lua'));
      // 阶段 B（B0 脚手架）：仅在显式 ?backend=webgpu 且浏览器支持 navigator.gpu 时启用
      // WebGPU 后端。缺省仍走已验证的 WebGL2 路径（harness/CI 绿）。设备在 preRun 里异步
      // 预创建并挂到 Module.preinitializedWebGPUDevice，C++ 经 emscripten_webgpu_get_device()
      // 取得；不可用/失败时上层自动回退 OpenGL(WebGL2)。
      var wantBackend = p.get('backend');
      window.__dseWantWebGPU = false;
      if (wantBackend === 'webgpu' && mode === '3d') {
        if (dseHasWebGPU()) {
          window.__dseWantWebGPU = true;
          args.push('--backend=webgpu');
        } else {
          console.warn('[dse] ?backend=webgpu requested but navigator.gpu unavailable; using WebGL2');
        }
      } else if (wantBackend === 'webgl2' || wantBackend === 'opengl') {
        args.push('--backend=webgl2');
      }
      window.__dseArgs = args;
      return args;
    }

    // 大资产懒加载：把单个文件 fetch 进 MEMFS，按需建立父目录。
    function dseWriteFileToMemFS(FS, path, data) {
      var parts = path.split('/').filter(Boolean);
      var cur = '';
      for (var k = 0; k < parts.length - 1; k++) {
        cur += '/' + parts[k];
        try { FS.mkdir(cur); } catch (e) { /* 已存在 */ }
      }
      FS.writeFile('/' + parts.join('/'), data);
    }

    var statusEl = document.getElementById('status');
    var barEl = document.querySelector('#bar > div');
    var loadingEl = document.getElementById('loading');
    var Module = {
      arguments: dseBuildArgs(),
      canvas: (function () { return document.getElementById('canvas'); })(),
      print: function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) {
        if (statusEl) statusEl.textContent = text || '';
        var m = text && text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m && barEl) {
          var pct = parseInt(m[2]) / parseInt(m[4]) * 100;
          barEl.style.width = pct + '%';
        }
      },
      preRun: [function () {
        // 阶段 B（B0）：若请求 WebGPU 且浏览器支持，异步取适配器/设备并挂到
        // Module.preinitializedWebGPUDevice，供 C++ emscripten_webgpu_get_device() 读取。
        // 用 addRunDependency 让 main 等待设备就绪；失败/不支持则不挂设备，C++ 取到 0 句柄
        // → InitDevice 返回 false → 上层自动回退 OpenGL(WebGL2)。
        if (!window.__dseWantWebGPU || !navigator.gpu) return;
        Module.addRunDependency('dse-webgpu-device');
        var wgpuDone = function () { Module.removeRunDependency('dse-webgpu-device'); };
        navigator.gpu.requestAdapter().then(function (adapter) {
          if (!adapter) { console.warn('[dse] WebGPU: no adapter; fallback WebGL2'); wgpuDone(); return; }
          // GPU-driven 间接绘制按 base_instance 索引实例 SSBO（等价 GL gl_BaseInstance）；
          // WebGPU 下 @builtin(instance_index) 仅在启用 'indirect-first-instance' 特性时含 firstInstance。
          // 适配器支持则请求之，否则非零 firstInstance 间接绘制行为未定义（多实例索引错乱）。
          var feats = [];
          if (adapter.features && adapter.features.has('indirect-first-instance')) {
            feats.push('indirect-first-instance');
          }
          return adapter.requestDevice({ requiredFeatures: feats }).then(function (device) {
            if (!device) { console.warn('[dse] WebGPU: no device; fallback WebGL2'); wgpuDone(); return; }
            Module.preinitializedWebGPUDevice = device;
            console.log('[dse] WebGPU device pre-created for backend=webgpu');
            wgpuDone();
          });
        }).catch(function (e) {
          console.warn('[dse] WebGPU device acquisition failed: ' + (e && e.message) + '; fallback WebGL2');
          wgpuDone();
        });
      }, function () {
        // 大资产 MEMFS→fetch 懒加载（A5）：可选 assets.json 清单列出需在运行时拉取的
        // 文件，逐个 fetch 写入 MEMFS（避免膨胀 .data 预载包）。引擎 VFS 同步读取，
        // 故必须在 main 之前写好——用 addRunDependency 让运行时等待 fetch 完成。
        // 清单缺失（404）非致命：维持纯 .data MEMFS 行为，字节级不变。
        var FS = Module.FS;
        if (!FS) return;
        Module.addRunDependency('dse-lazy-assets');
        var done = function () { Module.removeRunDependency('dse-lazy-assets'); };
        fetch('assets.json').then(function (r) {
          if (!r.ok) { done(); return; }
          return r.json().then(function (manifest) {
            var files = (manifest && manifest.files) || [];
            if (!files.length) { done(); return; }
            var total = files.length, loaded = 0;
            Module.setStatus('Fetching assets (0/' + total + ')');
            var next = function (i) {
              if (i >= files.length) { done(); return; }
              var path = files[i];
              fetch(path.replace(/^\//, '')).then(function (fr) {
                if (!fr.ok) throw new Error('HTTP ' + fr.status);
                return fr.arrayBuffer();
              }).then(function (buf) {
                dseWriteFileToMemFS(FS, path, new Uint8Array(buf));
                loaded++;
                Module.setStatus('Fetching assets (' + loaded + '/' + total + ')');
                next(i + 1);
              }).catch(function (e) {
                console.warn('[dse] lazy asset fetch failed: ' + path + ' (' + e.message + ')');
                next(i + 1);  // 单个失败不致命
              });
            };
            next(0);
          });
        }).catch(function () { done(); });
      }],
      onRuntimeInitialized: function () {
        // 浏览器自动播放策略：首次交互后恢复 WebAudio。
        var resume = function () {
          if (typeof Module._dse_resume_audio === 'function') Module._dse_resume_audio();
          window.removeEventListener('pointerdown', resume);
          window.removeEventListener('keydown', resume);
        };
        window.addEventListener('pointerdown', resume);
        window.addEventListener('keydown', resume);
      }
    };
    Module.setStatus('Downloading…');
  </script>
  <script>
    // 视觉回归 harness 钩子（tests/web/visual_regression.mjs）：包裹全局
    // requestAnimationFrame，(1) 统计引擎已渲染帧数；(2) 应 headless 端请求，在
    // 引擎本帧迭代（绘制+呈现）刚结束、同一 rAF tick 内、浏览器尚未合成清空默认
    // framebuffer 之前，用 canvas.toDataURL 抓取像素。这样无需 preserveDrawingBuffer
    // 即可拿到非空帧，且完全不侵入引擎代码。emscripten_set_main_loop(fps=0) 走浏览器
    // rAF，故包裹即可覆盖引擎主循环。
    (function () {
      window.__dseFrames = 0;
      window.__dseCaptureRequested = false;
      window.__dseLastFrame = null;
      var raf = window.requestAnimationFrame.bind(window);
      window.requestAnimationFrame = function (cb) {
        return raf(function (t) {
          window.__dseFrames++;
          // 首帧实际渲染后再淡出加载层（比 emscripten 下载完成更贴近“画面就绪”）。
          if (window.__dseFrames === 1) {
            var el = document.getElementById('loading');
            if (el) el.classList.add('hidden');
          }
          var r = cb(t);
          if (window.__dseCaptureRequested) {
            window.__dseCaptureRequested = false;
            try {
              var c = document.getElementById('canvas');
              window.__dseLastFrame = c ? c.toDataURL('image/png') : 'ERR:no-canvas';
            } catch (e) { window.__dseLastFrame = 'ERR:' + e.message; }
          }
          return r;
        });
      };
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
