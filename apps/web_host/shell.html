<!DOCTYPE html>
<!--
  DSEngine Web 宿主页面模板（emcc --shell-file）。
  emcc 会把生成的胶水脚本注入到 {{{ SCRIPT }}} 处。
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>DSEngine</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1f2e; color: #cdd6f4;
                 font-family: system-ui, sans-serif; overflow: hidden; }
    #container { position: fixed; inset: 0; display: flex; align-items: center;
                 justify-content: center; }
    canvas.emscripten { display: block; border: 0; background: #000;
                        width: 100vw; height: 100vh; touch-action: none; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; gap: 12px;
               transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #bar { width: 240px; height: 6px; background: #313244; border-radius: 3px; overflow: hidden; }
    #bar > div { height: 100%; width: 0%; background: #89b4fa; transition: width 0.2s; }
    #title { font-size: 18px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <div id="loading">
    <div id="title">DSEngine</div>
    <div id="bar"><div></div></div>
    <div id="status">Loading…</div>
  </div>
  <script>
    var statusEl = document.getElementById('status');
    var barEl = document.querySelector('#bar > div');
    var loadingEl = document.getElementById('loading');
    var Module = {
      canvas: (function () { return document.getElementById('canvas'); })(),
      print: function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) {
        if (statusEl) statusEl.textContent = text;
        var m = text && text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m && barEl) barEl.style.width = (parseInt(m[2]) / parseInt(m[4]) * 100) + '%';
        if (!text) { if (loadingEl) loadingEl.classList.add('hidden'); }
      },
      onRuntimeInitialized: function () {
        // 浏览器自动播放策略：首次交互后恢复 WebAudio。
        var resume = function () {
          if (typeof Module._dse_resume_audio === 'function') Module._dse_resume_audio();
          window.removeEventListener('pointerdown', resume);
          window.removeEventListener('keydown', resume);
        };
        window.addEventListener('pointerdown', resume);
        window.addEventListener('keydown', resume);
      }
    };
    Module.setStatus('Downloading…');
  </script>
  {{{ SCRIPT }}}
</body>
</html>
