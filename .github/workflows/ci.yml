# DSEngine CI - Windows build + unit tests
name: CI

on:
  push:
    branches: [master, feature/editor-dev]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build_vs2022

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Debug
            vulkan: ON
            label: debug-vulkan
          - config: RelWithDebInfo
            vulkan: ON
            label: relwithdebinfo-vulkan

    name: ${{ matrix.label }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: CMake Configure
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} -G "Visual Studio 17 2022" -A x64 `
            -DDSE_BUILD_EDITOR=OFF `
            -DDSE_BUILD_LAUNCHER=OFF `
            -DDSE_BUILD_GTESTS=ON `
            -DDSE_ENABLE_SPINE=ON `
            -DDSE_ENABLE_3D=ON `
            -DDSE_ENABLE_VULKAN=${{ matrix.vulkan }} `
            -DDSE_ENABLE_D3D11=ON `
            -DDSE_ENABLE_PHYSX=ON

      - name: Build Engine DLL
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_engine --parallel

      - name: Build Unit Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_unit_tests --parallel

      - name: Build Integration Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_integration_tests --parallel

      - name: Build Smoke Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_smoke_tests --parallel

      - name: Run Tests (CTest)
        run: ctest --test-dir ${{ env.BUILD_DIR }} -C ${{ matrix.config }} --output-on-failure -L gtest --timeout 120

      - name: Build Lua Runtime
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_example_lua --parallel
