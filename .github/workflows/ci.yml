# DSEngine CI - Windows + Linux + Android build/test
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:        # 允许手动触发（CI 无额度时按需运行）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build_vs2022

jobs:
  build-and-test:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Debug
            vulkan: ON
            label: debug-vulkan-jolt
          - config: Release
            vulkan: ON
            label: release-vulkan-jolt
          - config: RelWithDebInfo
            vulkan: ON
            label: relwithdebinfo-vulkan-jolt

    name: ${{ matrix.label }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Vulkan SDK — 仅在需要时安装，使用官方离线安装器
      - name: Install Vulkan SDK
        if: matrix.vulkan == 'ON'
        shell: pwsh
        run: |
          $ver = "1.3.290.0"
          $installer = "$env:TEMP\VulkanSDK-$ver-Installer.exe"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      # 缓存第三方库编译产物（Jolt/Assimp/Box2D/Recast 等静态库）
      - name: Cache third-party libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/JoltPhysics
            ${{ env.BUILD_DIR }}/depends
            ${{ env.BUILD_DIR }}/Debug/*.lib
            ${{ env.BUILD_DIR }}/Release/*.lib
            ${{ env.BUILD_DIR }}/RelWithDebInfo/*.lib
            ${{ env.BUILD_DIR }}/lib
          key: deps-${{ matrix.label }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'depends/*/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ matrix.label }}-

      - name: CMake Configure
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} -G "Visual Studio 17 2022" -A x64 `
            -DDSE_BUILD_EDITOR=OFF `
            -DDSE_BUILD_LAUNCHER=OFF `
            -DDSE_BUILD_GTESTS=ON `
            -DDSE_ENABLE_SPINE=ON `
            -DDSE_ENABLE_3D=ON `
            -DDSE_ENABLE_VULKAN=${{ matrix.vulkan }} `
            -DDSE_ENABLE_D3D11=ON `
            -DDSE_ENABLE_PHYSX=OFF `
            -DDSE_ENABLE_JOLT=ON `
            -DDSE_ENABLE_PCH=ON

      - name: Build Engine
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_engine --parallel

      - name: Build Unit Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_unit_tests --parallel

      - name: Build Integration Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_integration_tests --parallel

      - name: Build Smoke Tests
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_gtest_smoke_tests --parallel

      - name: Build Lua Runtime
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_example_lua --parallel

      - name: Copy Runtime Assets
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.config }} --target dse_copy_assets

      - name: Deploy runtime DLLs for tests (Vulkan loader + Debug CRT)
        shell: pwsh
        run: |
          $cfg = "${{ matrix.config }}"
          # Test exes may live in bin\ (flat) or bin\<config>\ depending on per-config RUNTIME_OUTPUT_DIRECTORY; deploy next to each.
          $exes = Get-ChildItem "bin" -Recurse -Filter "dse_gtest_*.exe" -ErrorAction SilentlyContinue
          $targets = @($exes | ForEach-Object { $_.DirectoryName } | Sort-Object -Unique)
          if(-not $targets){ $targets = @((Join-Path (Get-Location) "bin")) }
          New-Item -ItemType Directory -Force -Path $targets | Out-Null
          # The project builds its own Vulkan loader; clean GPU-less runners have no vulkan-1.dll in System32.
          $vk = Get-ChildItem "${{ env.BUILD_DIR }}" -Recurse -Filter "vulkan-1*.dll" -ErrorAction SilentlyContinue | Sort-Object @{ Expression = { $_.Directory.Name -ieq $cfg }; Descending = $true } | Select-Object -First 1
          if(-not $vk){ Write-Error "vulkan-1.dll not found anywhere under ${{ env.BUILD_DIR }}"; exit 1 }
          $crt = @()
          if($env:VCToolsRedistDir){ $crt += Get-ChildItem (Join-Path $env:VCToolsRedistDir "debug_nonredist\x64\Microsoft.VC*.DebugCRT\*.dll") -ErrorAction SilentlyContinue }
          if($env:UniversalCRTSdkDir -and $env:UCRTVersion){ $u = Join-Path $env:UniversalCRTSdkDir ("bin\" + $env:UCRTVersion + "\x64\ucrt\ucrtbased.dll"); if(Test-Path $u){ $crt += Get-Item $u } }
          foreach($t in $targets){
            Copy-Item $vk.FullName (Join-Path $t "vulkan-1.dll") -Force
            foreach($c in $crt){ Copy-Item $c.FullName $t -Force }
            Write-Host "Deployed to $t : vulkan-1.dll + $($crt.Count) CRT dll(s)"
          }
      - name: Run Tests
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest -C ${{ matrix.config }} --output-on-failure --timeout 120 -T Test
        timeout-minutes: 15

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.label }}
          path: ${{ env.BUILD_DIR }}/Testing/**/*.xml
          retention-days: 14
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # 编辑器构建校验——对齐「默认构建 = 默认验收」：默认 preset 含 editor，CI 也需
  # 至少编译一次 editor，避免 editor 代码回归在 CI 漏检。
  # 仅编译（不运行 GUI）：editor 走 OpenGL，故关 Vulkan、用 D3D11 作为一条 RHI 后端。
  editor-build:
    runs-on: windows-2022
    name: editor-build-d3d11
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache third-party libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/JoltPhysics
            ${{ env.BUILD_DIR }}/depends
            ${{ env.BUILD_DIR }}/Release/*.lib
            ${{ env.BUILD_DIR }}/lib
          key: deps-editor-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'depends/*/CMakeLists.txt') }}
          restore-keys: |
            deps-editor-

      - name: CMake Configure (editor ON, D3D11, no Vulkan)
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} -G "Visual Studio 17 2022" -A x64 `
            -DDSE_BUILD_EDITOR=ON `
            -DDSE_BUILD_LAUNCHER=OFF `
            -DDSE_BUILD_GTESTS=OFF `
            -DDSE_ENABLE_SPINE=ON `
            -DDSE_ENABLE_3D=ON `
            -DDSE_ENABLE_VULKAN=OFF `
            -DDSE_ENABLE_D3D11=ON `
            -DDSE_ENABLE_PHYSX=OFF `
            -DDSE_ENABLE_JOLT=ON `
            -DDSE_ENABLE_PCH=ON

      - name: Build Editor (dse_editor_cpp)
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --target dse_editor_cpp --parallel

  # ───────────────────────────────────────────────────────────────────────────
  # SDK 打包闭环校验——把「打包 → 第三方消费 → 运行」跑成 CI 常态。
  # 复用 scripts/verify_sdk.ps1：配置 DSE_BUILD_SHARED=ON → 编译 dse_engine →
  # install(component sdk) → 校验关键产物（DSEngineConfig/headers/glm/entt）→
  # 用 find_package(DSEngine) 编译 examples/sdk_consumer → 运行可执行确认 DLL 可加载。
  # 取 Full/Release 作为发布主配置门槛（Vulkan OFF，无需 Vulkan SDK）。
  sdk-verify:
    runs-on: windows-2022
    name: sdk-verify-full-release
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify SDK end-to-end (package -> install -> consume -> run)
        shell: pwsh
        run: ./scripts/verify_sdk.ps1 -Profiles Full -Configs Release

  # ───────────────────────────────────────────────────────────────────────────
  # Linux 桌面构建（GLFW X11 + GL）——复用 scripts/verify_linux_build.sh（本地已验证）。
  # 构建 dse_engine 静态库 + Lua 运行时并校验产物为合法 ELF。
  # 注：本 job 首次真实运行待 CI 额度恢复后验证；命令对齐本地已通过的脚本。
  build-linux:
    runs-on: ubuntu-latest
    name: linux-gl-jolt
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps (toolchain + X11/GL dev libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Verify Linux build (engine static lib + Lua runtime ELF)
        run: bash scripts/verify_linux_build.sh
        env:
          BUILD_TYPE: Release

  # ───────────────────────────────────────────────────────────────────────────
  # Android arm64-v8a APK 打包验证——复用 scripts/verify_android_apk.ps1（本地已验证）。
  # 流程：host(x86_64) 构建 dse_shader_compiler → NDK 交叉编译引擎/.so →
  #       aapt2/zipalign/apksigner 打包签名 → 校验包名/签名/native 库。
  # 注：本 job 首次真实运行待 CI 额度恢复后验证；NDK 固定 r26d 以对齐本地验证环境。
  build-android:
    runs-on: ubuntu-latest
    name: android-arm64-apk
    env:
      ANDROID_NDK_VERSION: "26.3.11579264"   # r26d（与本地验证一致）
      ANDROID_BUILD_TOOLS: "34.0.0"
      ANDROID_TARGET_PLATFORM: "android-34"
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17 (keytool / jar / apksigner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host build deps (for dse_shader_compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Install Android SDK packages (platform + build-tools + NDK r26d)
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"; [ -x "$SDKMANAGER" ] || SDKMANAGER="$(find "$ANDROID_SDK_ROOT" -name sdkmanager -type f 2>/dev/null | head -1)"; echo "sdkmanager=$SDKMANAGER"; yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;${ANDROID_TARGET_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Build host shader compiler (x86_64 → bin/dse_shader_compiler)
        run: |
          cmake -S . -B build_host -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDSE_BUILD_GTESTS=OFF -DDSE_ENABLE_3D=ON -DDSE_ENABLE_JOLT=ON \
            -DDSE_ENABLE_PHYSX=OFF -DDSE_ENABLE_D3D11=OFF -DDSE_ENABLE_VULKAN=OFF
          cmake --build build_host --target dse_shader_compiler -j "$(nproc)"

      - name: Verify Android APK (arm64-v8a, NativeActivity, signed)
        shell: pwsh
        run: |
          ./scripts/verify_android_apk.ps1 `
            -Abi arm64-v8a -ApiLevel 24 `
            -BuildTools $env:ANDROID_BUILD_TOOLS -Platform $env:ANDROID_TARGET_PLATFORM `
            -HostShaderCompiler "$PWD/bin/dse_shader_compiler"

  # ---------------------------------------------------------------------------
  # Web (Emscripten / WebGL2) build. Mirrors build-android: the cross build needs
  # a host-built dse_shader_compiler. The EMSCRIPTEN CMake branch returns before
  # the shader-gen custom command, so embed/*.gen.h (incl. ESSL 300) must be
  # generated explicitly before the wasm link.
  build-web:
    runs-on: ubuntu-latest
    name: web-wasm-webgl2
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build deps (for dse_shader_compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Build host shader compiler (x86_64 -> bin/dse_shader_compiler)
        run: |
          cmake -S . -B build_host -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDSE_BUILD_GTESTS=OFF -DDSE_ENABLE_3D=ON -DDSE_ENABLE_JOLT=ON \
            -DDSE_ENABLE_PHYSX=OFF -DDSE_ENABLE_D3D11=OFF -DDSE_ENABLE_VULKAN=OFF
          cmake --build build_host --target dse_shader_compiler -j "$(nproc)"

      - name: Generate shader embed headers (incl. ESSL 300 for WebGL2)
        run: |
          ./bin/dse_shader_compiler \
            --input-dir engine/render/shaders/src \
            --output-dir engine/render/shaders/generated \
            --target all --embed

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Configure (emcmake) + build dse_web_host
        run: |
          emcmake cmake -S . -B build_web -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDSE_HOST_SHADER_COMPILER="$PWD/bin/dse_shader_compiler"
          cmake --build build_web --target dse_web_host -j "$(nproc)"

      - name: Verify web artifacts (index.html / .js / .wasm)
        run: |
          ls -lh bin/index.html bin/index.js bin/index.wasm

      # B5: headless 视觉回归。两后端均跑软件渲染（无需宿主 GPU）：
      #   WebGL2 → SwiftShader(ANGLE)；WebGPU → Dawn + SwiftShader Vulkan。
      # 对照已提交 golden（tests/web/baseline/web3d.png, web3d_wgpu.png），超阈值即失败。
      - name: Setup Node.js (visual-regression harness)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # puppeteer 自带 Chrome-for-Testing，但需系统共享库才能无头启动。
      - name: Install headless Chrome system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 \
            libpango-1.0-0 libcairo2 libatspi2.0-0

      # 仓库 .gitignore 不跟踪 package-lock.json，故用 npm install（非 npm ci）。
      - name: Install harness deps (puppeteer + pixelmatch + pngjs)
        working-directory: tests/web
        run: npm install --no-audit --no-fund

      - name: Visual regression — WebGL2 (SwiftShader)
        run: node tests/web/visual_regression.mjs --backend webgl2 --name web3d

      - name: Visual regression — WebGPU (Dawn + SwiftShader Vulkan)
        run: node tests/web/visual_regression.mjs --backend webgpu --name web3d_wgpu

      # B6: WebGPU self-test harness. The single-scene golden regression above does
      # NOT cover the web-only hot paths (compute async readback, mega-VAO, GPU-driven
      # indirect, CSM / point-light cube shadow occlusion, …). The harness — gated by
      # -DDSE_WEBGPU_SELFTEST=ON, off in shipping builds — records a battery of isolated
      # offscreen self-tests on first idle frame and logs PASS/FAIL per test. This
      # diagnostic build reuses the host shader compiler + embed headers already
      # generated above; it overwrites bin/index.* (the regression already ran), then
      # the runner boots it under Dawn + SwiftShader and fails CI on any FAIL / missing
      # T5-6 point-light cube true-shadow occlusion result.
      - name: Configure (emcmake) + build self-test harness (DSE_WEBGPU_SELFTEST=ON)
        run: |
          emcmake cmake -S . -B build_web_selftest -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDSE_WEBGPU_SELFTEST=ON \
            -DDSE_HOST_SHADER_COMPILER="$PWD/bin/dse_shader_compiler"
          cmake --build build_web_selftest --target dse_web_host -j "$(nproc)"

      - name: Run WebGPU self-test harness (Dawn + SwiftShader Vulkan)
        run: node tests/web/selftest_harness.mjs --frames 241

      - name: Upload visual-regression artifacts (actual/diff PNGs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-visual-regression
          path: tests/web/artifacts/
          if-no-files-found: ignore
